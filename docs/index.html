<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>一番赏首页</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-stage">
    <section class="phone-frame" aria-label="一番赏首页预览">
      <div class="phone-screen">
        <section class="hero-banner">
          <img
            class="hero-cover"
            src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=pastel%20pink%20toy%20collectible%20banner%2C%20cute%20vinyl%20doll%20next%20to%20a%20large%20pink%20blind%20box%2C%20sweet%20macaron%20theme%2C%20warm%20peach%20background%2C%20premium%20promotional%20poster%2C%20soft%20glow%2C%20highly%20detailed&image_size=landscape_4_3"
            alt="甜心马卡龙系列一番赏 banner"
          />
          <div class="hero-dots" aria-hidden="true">
            <span></span>
            <span class="active"></span>
            <span></span>
          </div>
        </section>

        <section class="quick-entry" aria-label="快捷入口">
          <a href="#all" class="entry-item">
            <span class="entry-icon icon-pig">赏</span>
            <span>全部赏品</span>
          </a>
          <a href="#mine" class="entry-item">
            <span class="entry-icon icon-gift">奖</span>
            <span>我的奖品</span>
          </a>
          <a href="#notice" class="entry-item">
            <span class="entry-icon icon-horn">告</span>
            <span>活动公告</span>
          </a>
          <a href="#guide" class="entry-item">
            <span class="entry-icon icon-book">新</span>
            <span>新手指南</span>
          </a>
        </section>

        <section class="section-head" id="hot">
          <h3>热门一番赏</h3>
          <a href="#more">更多</a>
        </section>

        <section class="product-grid" aria-label="热门一番赏列表">
          <article class="product-card">
            <div class="product-image-wrap">
              <span class="badge rank">榜</span>
              <span class="badge hot">HOT</span>
              <img
                class="product-image"
                src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=cute%20designer%20toy%20wearing%20a%20cream%20forest%20bunny%20suit%2C%20lush%20green%20storybook%20background%2C%20collectible%20vinyl%20figure%2C%20soft%20light%2C%20highly%20detailed&image_size=square_hd"
                alt="LABUBU 森林秘境系列"
              />
            </div>
            <h4>LABUBU 森林秘境</h4>
            <p class="price">¥69/抽</p>
            <p class="meta">正热抽 2356 人</p>
          </article>

          <article class="product-card">
            <div class="product-image-wrap">
              <span class="badge rank">赏</span>
              <span class="badge new">NEW</span>
              <img
                class="product-image"
                src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=black%20haired%20collectible%20toy%20in%20a%20dark%20outfit%2C%20glowing%20teal%20forest%20scene%2C%20premium%20vinyl%20figure%2C%20soft%20cinematic%20lighting%2C%20adorable%20toy%20photography&image_size=square_hd"
                alt="DIMOO 时光漫游系列"
              />
            </div>
            <h4>DIMOO 时光漫游</h4>
            <p class="price">¥59/抽</p>
            <p class="meta">正热抽 1890 人</p>
          </article>

          <article class="product-card">
            <div class="product-image-wrap">
              <span class="badge rank">赏</span>
              <span class="badge soft">荐</span>
              <img
                class="product-image"
                src="https://coresg-normal.trae.ai/api/ide/v1/text_to_image?prompt=colorful%20space%20themed%20designer%20toy%20with%20pink%20and%20orange%20helmet%2C%20dreamy%20pastel%20planet%20background%2C%20collectible%20figure%2C%20highly%20detailed%2C%20soft%20light&image_size=square_hd"
                alt="MEGA SPACE 系列"
              />
            </div>
            <h4>MEGA SPACE 系列</h4>
            <p class="price">¥79/抽</p>
            <p class="meta">正热抽 1324 人</p>
          </article>
        </section>

        <nav class="tab-bar" aria-label="底部导航">
          <a href="#home" class="tab-item active">
            <span class="tab-icon">首</span>
            <span>首页</span>
          </a>
          <a href="#all" class="tab-item">
            <span class="tab-icon">赏</span>
            <span>全部赏品</span>
          </a>
          <a href="#draw" class="tab-item emphasis">
            <span class="tab-icon">抽</span>
            <span>抽赏</span>
          </a>
          <a href="#cart" class="tab-item">
            <span class="tab-icon">车</span>
            <span>购物车</span>
          </a>
          <a href="#profile" class="tab-item">
            <span class="tab-icon">我</span>
            <span>我的</span>
          </a>
        </nav>
      </div>
    </section>
  </main>
</body>
</html>
